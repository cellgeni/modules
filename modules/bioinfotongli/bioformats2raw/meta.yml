name: "bioinfotongli_bioformats2raw"
description: Java application to convert image file formats, including .mrxs, to an intermediate Zarr structure.
keywords:
  - bioimage
  - conversion
  - image_format
tools:
  - "bioinfotongli":
      description: "An any-image-to-zarr convertor"
      homepage: ""
      documentation: ""
      tool_dev_url: ""
      doi: "" #TODO
      licence: "" #TODO

input:
  - img:
      type: file
      description: Any image file supported by bioformats2raw
      pattern: "*.{tif,tiff,png,jpg,ndpi,czi}" # and others, see: https://docs.openmicroscopy.org/bio-formats/5.8.2/supported-formats.html

output:
  #
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
  - zarr:
      type: path
      description: input image in converted to zarr folder
      pattern: "*.{zarr}" # https://ngff.openmicroscopy.org/latest/

authors:
  - "@BioinfoTongLI"
